# Stack COCONEXUS.
#   dev   : cukup `mysql` (api & web jalan di host).  →  ./run.sh up
#   prod  : mysql + api + web (semua container).        →  ./run.sh deploy
services:
  mysql:
    image: mysql:8
    container_name: coconexus-mysql
    command: --innodb-buffer-pool-size=256M --max-connections=100
    environment:
      MYSQL_ROOT_PASSWORD: coconexus
      MYSQL_DATABASE: coconexus
    ports:
      - "127.0.0.1:33062:3306" # hanya localhost; tidak diekspos publik
    volumes:
      - coconexus_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pcoconexus"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    container_name: coconexus-api
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "mysql://root:coconexus@mysql:3306/coconexus"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://kms.trin-polman.id,http://localhost:8090}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET:-CHANGE_ME_access_secret}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:-CHANGE_ME_refresh_secret}"
      ACCESS_TOKEN_TTL: "15m"
      REFRESH_TOKEN_TTL_DAYS: "7"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@coconexus.test}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin#1234}"
      SEED_DEMO: "${SEED_DEMO:-true}"
      # Asisten AI (Ollama/OpenWebUI/OpenAI-compatible/Anthropic) — pre-configure via .env (opsional).
      # Untuk Ollama di host yang sama: AI_BASE_URL=http://host.docker.internal:11434/v1
      AI_ENABLED: "${AI_ENABLED:-}"
      AI_PROVIDER: "${AI_PROVIDER:-}"
      AI_BASE_URL: "${AI_BASE_URL:-}"
      AI_MODEL: "${AI_MODEL:-}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-}"
      AI_TOP_K: "${AI_TOP_K:-}"
    # Agar container API dapat menjangkau Ollama/OpenWebUI di HOST via host.docker.internal (Linux).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["prod"]

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
    container_name: coconexus-web
    ports:
      - "127.0.0.1:8090:80" # Cloudflare Tunnel → localhost:8090
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  coconexus_mysql:
